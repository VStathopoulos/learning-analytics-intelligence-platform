version: 2

models:
  - name: dim_student_module
    description: Student-level module dimension for dashboard filtering and cohort analysis.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_student
        description: Student identifier.
        data_tests:
          - not_null
      - name: gender
        description: Student gender category.
      - name: region
        description: Student region.
      - name: highest_education
        description: Highest education level reported for the student.
      - name: imd_band
        description: Index of Multiple Deprivation band, where available.
      - name: age_band
        description: Student age band.
      - name: num_of_prev_attempts
        description: Number of previous attempts for the module.
      - name: studied_credits
        description: Number of credits studied by the student.
      - name: disability
        description: Student disability indicator.
      - name: final_result
        description: Student final result for the module presentation.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Distinction", "Pass", "Fail", "Withdrawn"]
      - name: date_registration
        description: Registration date relative to the presentation start.
      - name: date_unregistration
        description: Unregistration date when a student withdrew.
      - name: is_withdrawn
        description: Boolean flag indicating whether the final result is Withdrawn.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_unregistered
        description: Boolean flag indicating whether an unregistration date exists.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: fct_course_engagement_daily
    description: Daily course-presentation engagement metrics for dashboard trends.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: activity_date
        description: VLE activity date relative to the presentation start.
        data_tests:
          - not_null
      - name: active_students
        description: Count of distinct students with VLE activity on the date.
        data_tests:
          - not_null
      - name: total_clicks
        description: Total VLE clicks recorded on the date.
        data_tests:
          - not_null
      - name: average_clicks_per_active_student
        description: Average clicks per active student on the date.
        data_tests:
          - not_null
      - name: total_active_sites
        description: Total active VLE site counts across active students.
        data_tests:
          - not_null
      - name: average_active_sites_per_active_student
        description: Average active VLE sites per active student.
        data_tests:
          - not_null
      - name: total_activity_types
        description: Total activity type counts across active students.
        data_tests:
          - not_null
      - name: average_activity_types_per_active_student
        description: Average activity types per active student.
        data_tests:
          - not_null

  - name: fct_assessment_performance
    description: Assessment-level submission and performance metrics for dashboards.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_assessment
        description: Assessment identifier.
        data_tests:
          - not_null
      - name: assessment_type
        description: Type of assessment.
        data_tests:
          - not_null
      - name: assessment_date
        description: Assessment date relative to the presentation start.
      - name: submitted_assessments
        description: Count of submitted assessment records.
        data_tests:
          - not_null
      - name: distinct_students_submitted
        description: Count of distinct students who submitted the assessment.
        data_tests:
          - not_null
      - name: average_score
        description: Average submitted assessment score.
        data_tests:
          - not_null
      - name: average_weighted_score
        description: Average score weighted by assessment contribution.
      - name: average_submission_delay_days
        description: Average delay between assessment date and submission date.
      - name: banked_submission_count
        description: Count of banked submissions.
        data_tests:
          - not_null

  - name: fct_student_engagement_summary
    description: Student-level VLE engagement summary at the grain of one row per code_module, code_presentation, id_student. Supports analysis of total engagement, active learning days, and declining engagement within each student's observed activity window.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_student
        description: Student identifier.
        data_tests:
          - not_null
      - name: first_activity_date
        description: Earliest observed VLE activity date for the student in the module presentation.
      - name: last_activity_date
        description: Latest observed VLE activity date for the student in the module presentation.
      - name: active_days
        description: Count of distinct VLE activity days observed for the student.
        data_tests:
          - not_null
      - name: total_clicks
        description: Total VLE clicks observed for the student.
        data_tests:
          - not_null
      - name: average_clicks_per_active_day
        description: Average VLE clicks per active learning day.
      - name: total_active_sites
        description: Total active VLE site counts across the student's active days.
        data_tests:
          - not_null
      - name: average_active_sites_per_active_day
        description: Average active VLE sites per active learning day.
      - name: total_activity_types
        description: Total activity type counts across the student's active days.
        data_tests:
          - not_null
      - name: average_activity_types_per_active_day
        description: Average activity types per active learning day.
      - name: early_total_clicks
        description: Total clicks on or before the midpoint of the student's observed activity window.
        data_tests:
          - not_null
      - name: late_total_clicks
        description: Total clicks after the midpoint of the student's observed activity window.
        data_tests:
          - not_null
      - name: engagement_change_ratio
        description: Ratio of late-window clicks to early-window clicks; null when early clicks are zero.
      - name: has_declining_engagement
        description: Boolean flag indicating whether late-window clicks are lower than early-window clicks.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: fct_student_assessment_summary
    description: Student-level assessment summary at the grain of one row per code_module, code_presentation, id_student. Supports analysis of assessment participation, average score, weighted score, late submissions, and banked submissions.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_student
        description: Student identifier.
        data_tests:
          - not_null
      - name: submitted_assessments
        description: Count of submitted assessment records for the student.
        data_tests:
          - not_null
      - name: distinct_assessments_submitted
        description: Count of distinct assessments submitted by the student.
        data_tests:
          - not_null
      - name: average_score
        description: Average assessment score across the student's submitted assessments.
      - name: average_weighted_score
        description: Average weighted assessment score across the student's submitted assessments.
      - name: total_weighted_score
        description: Sum of weighted assessment scores across the student's submitted assessments.
      - name: average_submission_delay_days
        description: Average delay between assessment due date and submission date in days.
      - name: late_submission_count
        description: Count of submitted assessments where submission occurred after the assessment date.
        data_tests:
          - not_null
      - name: banked_submission_count
        description: Count of banked assessment submissions.
        data_tests:
          - not_null

  - name: mart_student_success_features
    description: Student-success analytical feature mart at the grain of one row per code_module, code_presentation, id_student. Combines enrollment, demographics, engagement, assessment behavior, final outcome, and rule-based risk indicators. The risk indicators are interpretable analytical flags, not a validated predictive model.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_student
        description: Student identifier.
        data_tests:
          - not_null
      - name: gender
        description: Student gender category.
      - name: region
        description: Student region.
      - name: highest_education
        description: Highest education level reported for the student.
      - name: imd_band
        description: Index of Multiple Deprivation band, where available.
      - name: age_band
        description: Student age band.
      - name: num_of_prev_attempts
        description: Number of previous attempts for the module.
      - name: studied_credits
        description: Number of credits studied by the student.
      - name: disability
        description: Student disability indicator.
      - name: final_result
        description: Student final result for the module presentation.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Distinction", "Pass", "Fail", "Withdrawn"]
      - name: is_withdrawn
        description: Boolean flag indicating whether the final result is Withdrawn.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_unregistered
        description: Boolean flag indicating whether an unregistration date exists.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: active_days
        description: Count of distinct VLE activity days observed for the student.
        data_tests:
          - not_null
      - name: total_clicks
        description: Total VLE clicks observed for the student.
        data_tests:
          - not_null
      - name: submitted_assessments
        description: Count of submitted assessment records for the student.
        data_tests:
          - not_null
      - name: is_low_engagement
        description: Rule-based analytical flag for students with missing or low total VLE clicks.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: is_low_assessment_score
        description: Rule-based analytical flag for students with missing or low average assessment score.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_declining_engagement
        description: Rule-based analytical flag indicating whether late-window clicks are lower than early-window clicks.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: has_late_submission_pattern
        description: Rule-based analytical flag indicating whether the student has a positive average submission delay.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: risk_score_simple
        description: Simple count of rule-based student-success risk indicators present for the student.
        data_tests:
          - not_null
      - name: risk_band
        description: Rule-based analytical risk band derived from risk_score_simple.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Low", "Medium", "High"]

  - name: mart_withdrawal_prediction_features
    description: Leakage-aware feature mart for a future withdrawal prediction model at course day 30. One row represents an eligible student-module attempt that was still enrolled after day 30, with target and features limited to information available on or before the prediction day.
    columns:
      - name: code_module
        description: Course module code.
        data_tests:
          - not_null
      - name: code_presentation
        description: Course presentation code.
        data_tests:
          - not_null
      - name: id_student
        description: Student identifier retained for training joins and evaluation splits; future model training should exclude it from feature columns.
        data_tests:
          - not_null
      - name: prediction_day
        description: Course-relative prediction day for the feature snapshot.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [30]
                quote: false
      - name: withdraw_after_day_30
        description: Target flag indicating whether the student withdrew after day 30.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: gender
        description: Student gender category.
      - name: region
        description: Student region.
      - name: highest_education
        description: Highest education level reported for the student.
      - name: imd_band
        description: Index of Multiple Deprivation band, where available.
      - name: age_band
        description: Student age band.
      - name: num_of_prev_attempts
        description: Number of previous attempts for the module.
      - name: studied_credits
        description: Number of credits studied by the student.
      - name: disability
        description: Student disability indicator.
      - name: date_registration
        description: Registration date relative to the presentation start.
      - name: registered_before_course_start
        description: Boolean flag indicating whether registration occurred before course day 0.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: registration_to_prediction_days
        description: Days between registration and the day 30 prediction point.
      - name: early_total_clicks
        description: Total VLE clicks observed on or before day 30.
        data_tests:
          - not_null
      - name: early_active_days
        description: Count of distinct VLE activity days observed on or before day 30.
        data_tests:
          - not_null
      - name: early_distinct_sites
        description: Count of distinct VLE sites accessed on or before day 30.
        data_tests:
          - not_null
      - name: early_distinct_activity_types
        description: Count of distinct VLE activity types accessed on or before day 30.
        data_tests:
          - not_null
      - name: early_clicks_per_active_day
        description: Average clicks per active VLE day on or before day 30.
        data_tests:
          - not_null
      - name: had_early_vle_activity
        description: Boolean flag indicating whether the student had any VLE activity on or before day 30.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: early_submitted_assessments
        description: Count of assessment submissions made on or before day 30.
        data_tests:
          - not_null
      - name: early_average_score
        description: Average score for assessment submissions made on or before day 30; null when no early assessment exists.
      - name: early_weighted_score
        description: Sum of weighted assessment scores for submissions made on or before day 30.
        data_tests:
          - not_null
      - name: early_late_submissions
        description: Count of early assessment submissions submitted after their assessment due date.
        data_tests:
          - not_null
      - name: had_early_assessment
        description: Boolean flag indicating whether the student submitted any assessment on or before day 30.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
